<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Life Manager - Harini</title><style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color:#333;
}

header {
  background: rgba(0,0,0,0.7);
  color:#fff;
  padding:20px;
  text-align:center;
}

header h2 span {
  color:#00ffcc;
}

.container {
  padding:20px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover { transform:scale(1.05); }

input, textarea {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:8px 12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:#fff;
  cursor:pointer;
}

.dark { background:#121212; color:#fff; }
.dark .card { background:#1e1e1e; }

#timer { font-size:24px; font-weight:bold; }

.progress-container {
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
}

.progress-bar {
  height:100%;
  width:100%;
  background:#00ffcc;
  border-radius:10px;
  transition:width 1s linear;
}

</style></head><body><header>
<h2> <span>Harini</span>'s Smart Student Manager</h2>
<button onclick="toggleDarkMode()">🌙 Toggle Mode</button>
</header><div class="container"><div class="card">
<h3> Tasks</h3>
<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>
</div><div class="card">
<h3>📝 Notes</h3>
<textarea id="noteInput" placeholder="Write note"></textarea>
<button onclick="saveNote()">Save Note</button>
<p id="savedNote"></p>
<button onclick="deleteNote()">🗑️ Delete Note</button>
</div><div class="card">
<h3>⏱️ Focus Timer</h3>
<p id="timer">25:00</p>
<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">⏹️ Stop</button>
<button onclick="resetTimer()">🔄 Restart</button>
</div></div><script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

function renderTasks(){
let list = document.getElementById('taskList');
list.innerHTML='';
tasks.forEach((t,i)=>{
let li=document.createElement('li');
li.textContent=t;
let btn=document.createElement('button');
btn.textContent='❌';
btn.onclick=()=>{ tasks.splice(i,1); saveTasks(); };
li.appendChild(btn);
list.appendChild(li);
});
}

function addTask(){
let input=document.getElementById('taskInput');
if(input.value){
tasks.push(input.value);
saveTasks();
input.value='';
}
}

function saveTasks(){
localStorage.setItem('tasks', JSON.stringify(tasks));
renderTasks();
}

function saveNote(){
let note=document.getElementById('noteInput').value;
localStorage.setItem('note', note);
document.getElementById('savedNote').textContent=note;
}

function deleteNote(){
localStorage.removeItem('note');
document.getElementById('savedNote').textContent='';
document.getElementById('noteInput').value='';
}

document.getElementById('savedNote').textContent=localStorage.getItem('note')||'';

let time=1500;
let totalTime=1500;
let interval;

function startTimer(){
clearInterval(interval);
interval=setInterval(()=>{
if(time<=0){ clearInterval(interval); alert('Take a break!'); return; }
time--;
updateTimer();
},1000);
}

function stopTimer(){ clearInterval(interval); }

function resetTimer(){
clearInterval(interval);
time = 1500;
updateTimer();
}

function updateTimer(){
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').textContent=`${m}:${s<10?'0'+s:s}`;

let progress = (time / totalTime) * 100;
document.getElementById('progressBar').style.width = progress + '%';
}

function toggleDarkMode(){ document.body.classList.toggle('dark'); }

renderTasks();
updateTimer();
</script></body>
</html>
